<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cortex — Offline AI Productivity Platform for Students">
    <title>Cortex — Offline AI for Students</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <!-- Auth Screen (shown when not logged in) -->
    <div id="auth-container" style="display:none"></div>

    <!-- Main App (shown when logged in) -->
    <div id="app-container" style="display:none">
        <!-- Header -->
        <header id="app-header">
            <div class="header-left">
                <!-- Logo -->
                <div class="logo-group">
                    <div class="logo-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                        </svg>
                    </div>
                    <div>
                        <div class="logo-title">Cortex</div>
                        <div class="logo-sub">Offline AI</div>
                    </div>
                </div>

                <!-- Tab nav -->
                <nav id="tab-nav">
                    <button class="tab-button active" data-tab="search">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <span>Search</span>
                    </button>
                    <button class="tab-button" data-tab="notes">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                        </svg>
                        <span>Notes</span>
                    </button>
                    <button class="tab-button" data-tab="network">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="3" />
                            <circle cx="4" cy="19" r="3" />
                            <circle cx="20" cy="19" r="3" />
                            <line x1="12" y1="8" x2="4" y2="16" />
                            <line x1="12" y1="8" x2="20" y2="16" />
                        </svg>
                        <span>Network</span>
                    </button>
                    <button class="tab-button" data-tab="performance">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                        </svg>
                        <span>Performance</span>
                    </button>
                </nav>

                <!-- Upload PDF -->
                <div class="upload-group">
                    <input type="file" id="pdf-input" accept=".pdf" hidden>
                    <button id="upload-btn" class="btn-ghost upload-btn">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        Upload PDF
                    </button>
                </div>
            </div>

            <div class="header-right">
                <!-- Connectivity indicator -->
                <div class="connectivity-badge">
                    <div class="conn-dot offline" id="connectivity-dot"></div>
                    <span id="connectivity-label">Checking…</span>
                </div>

                <span id="provider-badge" class="provider-badge">
                    <div class="provider-dot"></div>
                    <span id="provider-label">ONNX Runtime</span>
                </span>
                <div id="doc-stats" class="doc-stats" style="display:none">
                    <div class="stats-divider"></div>
                    <div class="stats-info">
                        <span class="stats-dot"></span>
                        <span id="doc-count">0 docs</span>
                        <span class="stats-sep">·</span>
                        <span id="vec-count">0 vectors</span>
                    </div>
                </div>

                <!-- User / Logout -->
                <div class="user-section">
                    <span id="user-display" class="user-name" style="display:none"></span>
                    <button id="logout-btn" class="btn-ghost logout-btn" title="Sign out">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main id="tab-content" class="page-fade"></main>

        <!-- Toast -->
        <div id="toast-container"></div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>

</html>
